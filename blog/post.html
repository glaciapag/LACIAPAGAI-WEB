<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <meta name="description" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" id="hljs-theme" href="../css/highlight.min.css" />
</head>
<body>

  <header>
    <h1><a id="site-name" href="../"></a></h1>
    <nav class="header-nav" id="header-nav">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">☀︎</button>
    </nav>
  </header>

  <a href="/blog/" class="post-back">← Writing</a>

  <h1 class="post-title" id="post-title"></h1>
  <p class="post-meta" id="post-meta"></p>

  <div class="post-body" id="post-body"></div>

  <hr />

  <footer>
    <p id="footer-text"></p>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/marked.min.js"></script>
  <script src="../js/highlight.min.js"></script>
  <script>
    marked.use({ breaks: true });

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (!match) return { meta: {}, content: text };
      const meta = {};
      match[1].split('\n').forEach((line) => {
        const [key, ...rest] = line.split(':');
        if (key) meta[key.trim()] = rest.join(':').trim();
      });
      return { meta, content: match[2] };
    }

    async function loadPost() {
      const slug = new URLSearchParams(window.location.search).get('post');
      if (!slug) return;

      try {
        const res = await fetch(`posts/${slug}.md`);
        if (!res.ok) throw new Error();
        const { meta, content } = parseFrontmatter(await res.text());

        document.title = `${meta.title || slug}`;
        document.querySelector('meta[name="description"]').setAttribute('content', meta.description || '');
        document.getElementById('post-title').textContent = meta.title || slug;
        document.getElementById('post-meta').textContent = [meta.date, meta.readTime].filter(Boolean).join(' · ');
        document.getElementById('post-body').innerHTML = marked.parse(content);
        try { hljs.highlightAll(); } catch {}
      } catch {
        document.getElementById('post-title').textContent = 'Post not found';
        document.getElementById('post-meta').textContent = '';
      }
    }

    loadPost();
  </script>
</body>
</html>
